<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎓 JU Bus Locator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 14px 20px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 2px solid #e94560;
    }

    #controls {
      padding: 10px 16px;
      background: #16213e;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 1rem;
    }

    #status {
      padding: 8px 16px;
      background: #1a1a2e;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
    }

    #distance-banner {
      background: #0f3460;
      padding: 10px 16px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      display: none;
    }

    #stop-selector {
      padding: 8px 16px;
      background: #16213e;
      display: none;
      gap: 10px;
      align-items: center;
    }

    #stop-selector select {
      flex: 1;
    }

    #map { flex: 1; }

    #info-panel {
      background: #1a1a2e;
      padding: 12px 16px;
      border-top: 2px solid #e94560;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-around;
    }

    .info-item span {
      color: #e94560;
      font-weight: bold;
    }

    #gps-btn {
      padding: 10px 14px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>🚌 JU Bus Locator</header>

<div id="controls">
  <select id="busSelect">
    <option value="all">🚌 All Buses</option>
    <option value="bus1">Bus 1</option>
    <option value="bus2">Bus 2</option>
    <option value="bus3">Bus 3</option>
    <option value="bus4">Bus 4</option>
    <option value="bus5">Bus 5</option>
    <option value="bus6">Bus 6</option>
    <option value="bus7">Bus 7</option>
    <option value="bus8">Bus 8</option>
    <option value="bus9">Bus 9</option>
  </select>
  <button id="gps-btn" onclick="getStudentGPS()">📍 My Location</button>
</div>

<div id="stop-selector">
  <select id="stopSelect" onchange="pickStop()">
    <option value="">-- Pick a campus stop --</option>
    <option value="23.8800,90.2618">Main Gate</option>
    <option value="23.8823,90.2634">Transport Pool</option>
    <option value="23.8791,90.2652">Central Field</option>
    <option value="23.8810,90.2600">Zahir Raihan Hall</option>
    <option value="23.8835,90.2610">Al-Beruni Hall</option>
    <option value="23.8780,90.2630">New Arts Building</option>
  </select>
</div>

<div id="distance-banner">🚌 Calculating distance...</div>
<div id="status">⏳ Waiting for bus location...</div>

<div id="map"></div>

<div id="info-panel">
  <div class="info-item">🕒 Updated: <span id="lastUpdate">--</span></div>
  <div class="info-item">📍 Lat: <span id="latVal">--</span></div>
  <div class="info-item">📍 Lng: <span id="lngVal">--</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1fA_Clc5PEPDufI6KMemNlJ8hNsKhuKk",
    authDomain: "ju-bus-locator.firebaseapp.com",
    databaseURL: "https://ju-bus-locator-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ju-bus-locator",
    storageBucket: "ju-bus-locator.firebasestorage.app",
    messagingSenderId: "98070717917",
    appId: "1:98070717917:web:9740f08a0dbb06d9354234",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const map = L.map('map').setView([23.8800, 90.2618], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const studentIcon = L.divIcon({ html: '🧍', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

  // Bus labels for the map markers
  const busLabels = {
    bus1: '1️⃣', bus2: '2️⃣', bus3: '3️⃣',
    bus4: '4️⃣', bus5: '5️⃣', bus6: '6️⃣',
    bus7: '7️⃣', bus8: '8️⃣', bus9: '9️⃣'
  };

  // Store markers and listeners for each bus
  const busMarkers = {};   // busId → Leaflet marker
  const busListeners = {}; // busId → Firebase unsubscribe ref

  let studentMarker = null;
  let studentLat = null;
  let studentLng = null;

  // ── Haversine Distance ──────────────────────────────────────
  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── Find closest bus and update banner ─────────────────────
  function updateDistanceBanner() {
    if (studentLat === null) return;

    let closestDist = Infinity;
    let closestBus = null;

    for (const busId in busMarkers) {
      const marker = busMarkers[busId];
      const pos = marker.getLatLng();
      const dist = getDistance(studentLat, studentLng, pos.lat, pos.lng);
      if (dist < closestDist) {
        closestDist = dist;
        closestBus = busId;
      }
    }

    if (closestBus === null) return;

    const banner = document.getElementById('distance-banner');
    banner.style.display = 'block';

    const busNum = closestBus.replace('bus', 'Bus ');

    if (closestDist < 100) {
      banner.textContent = `🚌 ${busNum} is HERE! (less than 100m)`;
      banner.style.background = '#2ecc71';
    } else if (closestDist < 500) {
      banner.textContent = `🚌 ${busNum} is ${Math.round(closestDist)}m away — arriving soon!`;
      banner.style.background = '#f39c12';
    } else {
      banner.textContent = `🚌 Nearest: ${busNum} — ${(closestDist/1000).toFixed(2)} km away`;
      banner.style.background = '#0f3460';
    }

    notifyIfClose(closestDist);
  }

  // ── Track a single bus ──────────────────────────────────────
  function trackBus(busId) {
    const busRef = ref(db, 'buses/' + busId);

    const icon = L.divIcon({
      html: busLabels[busId] || '🚌',
      className: '',
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    onValue(busRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      if (!busMarkers[busId]) {
        busMarkers[busId] = L.marker([data.lat, data.lng], { icon })
          .addTo(map)
          .bindPopup(`🚌 Bus ${busId.replace('bus', '')}`);
      } else {
        busMarkers[busId].setLatLng([data.lat, data.lng]);
      }

      // Update info panel with latest bus data
      document.getElementById('latVal').textContent = data.lat.toFixed(5);
      document.getElementById('lngVal').textContent = data.lng.toFixed(5);
      document.getElementById('lastUpdate').textContent = new Date(data.timestamp).toLocaleTimeString();
      document.getElementById('status').textContent = '✅ Live tracking active';

      updateDistanceBanner();
    });

    busListeners[busId] = busRef;
  }

  // ── Stop tracking a single bus ──────────────────────────────
  function stopTrackingBus(busId) {
    if (busListeners[busId]) {
      off(busListeners[busId]);
      delete busListeners[busId];
    }
    if (busMarkers[busId]) {
      map.removeLayer(busMarkers[busId]);
      delete busMarkers[busId];
    }
  }

  // ── Track all buses ─────────────────────────────────────────
  function trackAllBuses() {
    ['bus1','bus2','bus3','bus4','bus5','bus6','bus7','bus8','bus9'].forEach(trackBus);
  }

  // ── Stop all tracking ───────────────────────────────────────
  function stopAllTracking() {
    ['bus1','bus2','bus3','bus4','bus5','bus6','bus7','bus8','bus9'].forEach(stopTrackingBus);
  }

  // ── Bus selector change ─────────────────────────────────────
  document.getElementById('busSelect').addEventListener('change', (e) => {
    stopAllTracking();
    document.getElementById('distance-banner').style.display = 'none';
    document.getElementById('status').textContent = '⏳ Waiting for bus location...';

    if (e.target.value === 'all') {
      trackAllBuses();
    } else {
      trackBus(e.target.value);
    }
  });

  // ── Student location ────────────────────────────────────────
  function setStudentLocation(lat, lng, label) {
    studentLat = lat;
    studentLng = lng;
    if (studentMarker) map.removeLayer(studentMarker);
    studentMarker = L.marker([lat, lng], { icon: studentIcon })
      .addTo(map)
      .bindPopup(label)
      .openPopup();
    updateDistanceBanner();
  }

  window.getStudentGPS = function() {
    if (!navigator.geolocation) {
      showStopSelector("GPS not supported on this device.");
      return;
    }
    document.getElementById('status').textContent = '📡 Getting your location...';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setStudentLocation(pos.coords.latitude, pos.coords.longitude, "📍 You are here");
        document.getElementById('status').textContent = '✅ Your location found via GPS';
      },
      () => {
        showStopSelector("GPS failed. Please pick your stop:");
      }
    );
  };

  window.pickStop = function() {
    const val = document.getElementById('stopSelect').value;
    if (!val) return;
    const [lat, lng] = val.split(',').map(Number);
    setStudentLocation(lat, lng, "📍 Selected stop");
    document.getElementById('status').textContent = '✅ Stop selected';
  };

  function showStopSelector(msg) {
    document.getElementById('status').textContent = msg;
    document.getElementById('stop-selector').style.display = 'flex';
  }

  // ── Notifications ───────────────────────────────────────────
  let notifiedClose = false;

  async function setupNotifications() {
    if (!('serviceWorker' in navigator)) return;
    try {
      await navigator.serviceWorker.register('/sw.js');
    } catch (err) {
      console.error('SW registration failed:', err);
    }
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      alert('Please allow notifications to get bus alerts!');
    }
  }

  function notifyIfClose(distanceMeters) {
    if (distanceMeters < 500 && !notifiedClose) {
      notifiedClose = true;
      new Notification('🚌 Bus is nearby!', {
        body: `The bus is ${Math.round(distanceMeters)}m away. Get ready!`,
      });
      setTimeout(() => { notifiedClose = false; }, 2 * 60 * 1000);
    }
  }

  setupNotifications();

  // ── Start: show all buses by default ───────────────────────
  trackAllBuses();

</script>

</body>
</html>
