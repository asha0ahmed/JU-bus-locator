<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JU Bus Locator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:   #0d1117;
      --bg-panel:  #161b27;
      --bg-card:   #1e2535;
      --accent:    #3b82f6;
      --ok:        #22c55e;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --border:    #2d3748;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Nunito',sans-serif;
      background:var(--bg-deep); color:var(--text);
      height:100vh; display:flex; flex-direction:column;
    }

    header {
      background:var(--bg-panel);
      padding:12px 16px;
      display:flex; align-items:center; gap:10px;
      border-bottom:2px solid var(--border);
    }
    .header-icon {
      width:36px; height:36px; border-radius:10px;
      background:var(--accent);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 12px rgba(59,130,246,.4);
      flex-shrink:0;
    }
    header h1 { font-size:1.1rem; font-weight:800; letter-spacing:-.3px; }
    header h1 span { color:var(--accent); }
    .live-badge {
      margin-left:auto;
      background:var(--ok); color:#fff;
      font-size:.68rem; font-weight:700;
      padding:4px 10px; border-radius:20px;
      letter-spacing:.6px; text-transform:uppercase;
      display:flex; align-items:center; gap:5px;
    }
    .live-dot {
      width:7px; height:7px; border-radius:50%; background:#fff;
      animation:pulse 1.2s infinite;
    }

    #controls {
      padding:10px 14px; background:var(--bg-panel);
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid var(--border);
    }
    .select-wrap { flex:1; position:relative; }
    .select-icon {
      position:absolute; left:10px; top:50%;
      transform:translateY(-50%);
      display:flex; align-items:center;
      pointer-events:none; z-index:1;
    }
    select {
      width:100%; padding:9px 10px 9px 34px;
      border-radius:10px; border:1.5px solid var(--border);
      background:var(--bg-card); color:var(--text);
      font-size:.9rem; font-family:'Nunito',sans-serif; font-weight:600;
      appearance:none; cursor:pointer; outline:none;
      transition:border-color .2s;
    }
    select:focus { border-color:var(--accent); }

    #gps-btn {
      display:flex; align-items:center; gap:7px;
      padding:9px 14px; background:var(--accent);
      border:none; border-radius:10px; color:#fff;
      font-size:.85rem; font-family:'Nunito',sans-serif; font-weight:700;
      cursor:pointer; white-space:nowrap;
      box-shadow:0 2px 10px rgba(59,130,246,.3);
      transition:background .2s,transform .1s;
    }
    #gps-btn:hover { background:#2563eb; transform:translateY(-1px); }
    #gps-btn:active { transform:translateY(0); }

    #stop-selector {
      padding:8px 14px; background:var(--bg-panel);
      display:none; gap:8px; align-items:center;
      border-bottom:1px solid var(--border);
    }

    #distance-banner {
      padding:10px 16px; font-size:.95rem; font-weight:700; color:#fff;
      display:none; align-items:center; justify-content:center; gap:10px;
      transition:background .4s;
    }
    #distance-banner .pulse-dot {
      width:8px; height:8px; border-radius:50%; background:#fff; opacity:.85;
      animation:pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { transform:scale(1); opacity:.85; }
      50%      { transform:scale(1.6); opacity:.3; }
    }

    #status {
      padding:6px 14px; background:var(--bg-deep);
      font-size:.78rem; color:var(--muted); text-align:center;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; gap:6px;
    }

    #map { flex:1; }

    #info-panel {
      background:var(--bg-panel); padding:10px 16px;
      border-top:1px solid var(--border);
      display:flex; justify-content:space-around; gap:8px;
    }
    .info-item { display:flex; align-items:center; gap:8px; font-size:.78rem; color:var(--muted); }
    .info-icon {
      width:28px; height:28px; background:var(--bg-card);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      border:1px solid var(--border);
    }
    .info-item strong { color:var(--text); font-weight:700; font-size:.82rem; display:block; }

    /* ── Direction label floating above each bus pin ── */
    .bus-label-wrap {
      display:flex; flex-direction:column; align-items:center; gap:2px;
    }
    .dir-tag {
      background:rgba(15,17,26,.85);
      border:1px solid rgba(255,255,255,.15);
      border-radius:6px;
      padding:2px 7px;
      font-family:'Nunito',sans-serif;
      font-size:10px; font-weight:700;
      color:#fff;
      white-space:nowrap;
      backdrop-filter:blur(4px);
      line-height:1.4;
    }

    @keyframes spin-anim { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ic-bus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="13" rx="2"/><path d="M3 10h18M8 18v2m8-2v2M5 5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2"/>
    <circle cx="8" cy="15" r="1" fill="currentColor" stroke="none"/>
    <circle cx="16" cy="15" r="1" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="ic-crosshairs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
  </symbol>
  <symbol id="ic-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C8.69 2 6 4.69 6 8c0 5 6 13 6 13s6-8 6-13c0-3.31-2.69-6-6-6z"/>
    <circle cx="12" cy="8" r="2.5"/>
  </symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
  </symbol>
  <symbol id="ic-updown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v18M7 8l5-5 5 5M7 16l5 5 5-5"/>
  </symbol>
  <symbol id="ic-leftright" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12h18M8 7l-5 5 5 5M16 7l5 5-5 5"/>
  </symbol>
  <symbol id="ic-signal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 4v16"/>
  </symbol>
  <symbol id="ic-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
  </symbol>
  <symbol id="ic-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
  </symbol>
</svg>

<header>
  <div class="header-icon">
    <svg width="18" height="18" style="stroke:white"><use href="#ic-bus"/></svg>
  </div>
  <h1>JU <span>Bus</span> Locator</h1>
  <span class="live-badge"><div class="live-dot"></div> Live</span>
</header>

<div id="controls">
  <div class="select-wrap">
    <span class="select-icon">
      <svg width="14" height="14" style="stroke:var(--muted)"><use href="#ic-bus"/></svg>
    </span>
    <select id="busSelect">
      <option value="all">All Buses</option>
      <option value="bus1">Bus 1</option>
      <option value="bus2">Bus 2</option>
      <option value="bus3">Bus 3</option>
      <option value="bus4">Bus 4</option>
      <option value="bus5">Bus 5</option>
      <option value="bus6">Bus 6</option>
      <option value="bus7">Bus 7</option>
      <option value="bus8">Bus 8</option>
      <option value="bus9">Bus 9</option>
    </select>
  </div>
  <button id="gps-btn" onclick="getStudentGPS()">
    <svg width="14" height="14" style="stroke:white"><use href="#ic-crosshairs"/></svg>
    My Location
  </button>
</div>

<div id="stop-selector">
  <div class="select-wrap">
    <span class="select-icon">
      <svg width="14" height="14" style="stroke:var(--muted)"><use href="#ic-pin"/></svg>
    </span>
    <select id="stopSelect" onchange="pickStop()">
      <option value="">— Pick a campus stop —</option>
      <option value="23.8800,90.2618">Main Gate</option>
      <option value="23.8823,90.2634">Transport Pool</option>
      <option value="23.8791,90.2652">Central Field</option>
      <option value="23.8810,90.2600">Zahir Raihan Hall</option>
      <option value="23.8835,90.2610">Al-Beruni Hall</option>
      <option value="23.8780,90.2630">New Arts Building</option>
    </select>
  </div>
</div>

<div id="distance-banner">
  <div class="pulse-dot"></div>
  <span id="banner-text">Calculating distance...</span>
</div>
<div id="status">
  <svg width="12" height="12" style="stroke:var(--muted);animation:spin-anim 1s linear infinite"><use href="#ic-spin"/></svg>
  Waiting for bus location...
</div>

<div id="map"></div>

<div id="info-panel">
  <div class="info-item">
    <div class="info-icon"><svg width="14" height="14" style="stroke:var(--accent)"><use href="#ic-clock"/></svg></div>
    <div><div>Updated</div><strong id="lastUpdate">--</strong></div>
  </div>
  <div class="info-item">
    <div class="info-icon"><svg width="14" height="14" style="stroke:var(--accent)"><use href="#ic-updown"/></svg></div>
    <div><div>Lat</div><strong id="latVal">--</strong></div>
  </div>
  <div class="info-item">
    <div class="info-icon"><svg width="14" height="14" style="stroke:var(--accent)"><use href="#ic-leftright"/></svg></div>
    <div><div>Lng</div><strong id="lngVal">--</strong></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1fA_Clc5PEPDufI6KMemNlJ8hNsKhuKk",
    authDomain: "ju-bus-locator.firebaseapp.com",
    databaseURL: "https://ju-bus-locator-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ju-bus-locator",
    storageBucket: "ju-bus-locator.firebasestorage.app",
    messagingSenderId: "98070717917",
    appId: "1:98070717917:web:9740f08a0dbb06d9354234",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const map = L.map('map').setView([23.8800, 90.2618], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const busColors = {
    bus1:'#ef4444', bus2:'#f97316', bus3:'#eab308',
    bus4:'#22c55e', bus5:'#06b6d4', bus6:'#3b82f6',
    bus7:'#8b5cf6', bus8:'#ec4899', bus9:'#14b8a6'
  };

  // Human-readable direction label
  function dirLabel(dir) {
    if (dir === 'campus-to-dhaka') return 'Campus → Dhaka';
    if (dir === 'dhaka-to-campus') return 'Dhaka → Campus';
    return null;
  }

  // Bus map pin — includes a direction tag above the teardrop
  function makeBusIcon(busId, direction) {
    const color = busColors[busId] || '#3b82f6';
    const num   = busId.replace('bus','');
    const label = dirLabel(direction);

    // Direction tag HTML (only shown when direction is known)
    const tagHtml = label
      ? `<div class="dir-tag">${label}</div>`
      : '';

    const pinSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52">
      <defs>
        <filter id="sh${num}" x="-40%" y="-30%" width="180%" height="180%">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="${color}" flood-opacity="0.4"/>
        </filter>
      </defs>
      <path d="M20 1C10.06 1 2 9.06 2 19c0 11 18 32 18 32S38 30 38 19C38 9.06 29.94 1 20 1z"
            fill="${color}" filter="url(#sh${num})"/>
      <circle cx="20" cy="18" r="12" fill="white"/>
      <rect x="13" y="13" width="14" height="9" rx="2" fill="${color}"/>
      <rect x="14" y="12" width="12" height="2" rx="1" fill="${color}"/>
      <circle cx="16" cy="22" r="1.5" fill="${color}"/>
      <circle cx="24" cy="22" r="1.5" fill="${color}"/>
      <line x1="13" y1="17" x2="27" y2="17" stroke="white" stroke-width="1"/>
      <text x="20" y="16" text-anchor="middle"
            font-family="Nunito,Arial,sans-serif" font-weight="800"
            font-size="7" fill="white">${num}</text>
    </svg>`;

    const html = `<div class="bus-label-wrap">${tagHtml}${pinSvg}</div>`;

    // iconAnchor points to tip of pin. Extra height for the tag when present.
    const tagH = label ? 20 : 0;
    return L.divIcon({
      html,
      className: '',
      iconSize:    [100, 52 + tagH],
      iconAnchor:  [50,  52 + tagH],   // horizontal center, bottom tip
      popupAnchor: [0,  -(52 + tagH)]
    });
  }

  // Student pin
  function makeStudentIcon() {
    const color = '#6366f1';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
      <defs>
        <filter id="shStu" x="-40%" y="-30%" width="180%" height="180%">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="${color}" flood-opacity="0.4"/>
        </filter>
      </defs>
      <path d="M18 1C9.16 1 2 8.16 2 17c0 10 16 30 16 30S34 27 34 17C34 8.16 26.84 1 18 1z"
            fill="${color}" filter="url(#shStu)"/>
      <circle cx="18" cy="16" r="11" fill="white"/>
      <circle cx="18" cy="11" r="3" fill="${color}"/>
      <path d="M11 24 Q18 18 25 24" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="18" y2="23" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="21" x2="22" y2="21" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="23" x2="13" y2="27" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="21" y1="23" x2="23" y2="27" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`;
    return L.divIcon({ html:svg, className:'', iconSize:[36,48], iconAnchor:[18,48], popupAnchor:[0,-50] });
  }

  const busMarkers    = {};
  const busListeners  = {};
  const busDirections = {}; // store latest direction per bus
  let studentMarker   = null;
  let studentLat      = null;
  let studentLng      = null;

  function getDistance(lat1,lng1,lat2,lng2){
    const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  function updateDistanceBanner(){
    if(studentLat===null) return;
    let closestDist=Infinity, closestBus=null;
    for(const busId in busMarkers){
      const pos=busMarkers[busId].getLatLng();
      const dist=getDistance(studentLat,studentLng,pos.lat,pos.lng);
      if(dist<closestDist){closestDist=dist;closestBus=busId;}
    }
    if(!closestBus) return;
    const banner=document.getElementById('distance-banner');
    const bannerText=document.getElementById('banner-text');
    banner.style.display='flex';
    const busNum  = closestBus.replace('bus','Bus ');
    const dirText = dirLabel(busDirections[closestBus]);
    const dirPart = dirText ? ` · ${dirText}` : '';

    if(closestDist<100)      { banner.style.background='#166534'; bannerText.textContent=`${busNum}${dirPart} — HERE! (<100m)`; }
    else if(closestDist<500) { banner.style.background='#92400e'; bannerText.textContent=`${busNum}${dirPart} — ${Math.round(closestDist)}m away!`; }
    else                     { banner.style.background='#1e3a5f'; bannerText.textContent=`Nearest: ${busNum}${dirPart} — ${(closestDist/1000).toFixed(2)} km`; }
    notifyIfClose(closestDist);
  }

  function setStatus(iconId,color,text){
    const bar=document.getElementById('status');
    bar.innerHTML=`<svg width="12" height="12" style="stroke:${color};flex-shrink:0"><use href="#${iconId}"/></svg> ${text}`;
  }

  function trackBus(busId){
    const busRef=ref(db,'buses/'+busId);
onValue(busRef,(snapshot)=>{
      const data=snapshot.val(); if(!data) return;
      
      // If last update was more than 30 seconds ago, treat as offline
      const age = Date.now() - data.timestamp;
      if(age > 30000) {
        setStatus('ic-warn','#f59e0b',`Bus ${busId.replace('bus','')} signal lost — last seen ${Math.round(age/1000)}s ago`);
        return;
      }

      // Store latest direction
      busDirections[busId] = data.direction || null;

      // Rebuild icon with updated direction label
      const icon=makeBusIcon(busId, data.direction);

      if(!busMarkers[busId]){
        busMarkers[busId]=L.marker([data.lat,data.lng],{icon}).addTo(map);
      } else {
        busMarkers[busId].setLatLng([data.lat,data.lng]);
        busMarkers[busId].setIcon(icon);
      }

      // Update popup content
      const dl = dirLabel(data.direction);
      const dirLine = dl
        ? `<div style="font-size:11px;color:#64748b;margin-top:2px">${dl}</div>`
        : '';
      busMarkers[busId].bindPopup(`
        <div style="font-family:Nunito,sans-serif;font-size:13px">
          <div style="font-weight:700;display:flex;align-items:center;gap:6px">
            <span style="width:10px;height:10px;border-radius:50%;background:${busColors[busId]};display:inline-block"></span>
            Bus ${busId.replace('bus','')} — Live
          </div>
          ${dirLine}
        </div>`);

      document.getElementById('latVal').textContent    =data.lat.toFixed(5);
      document.getElementById('lngVal').textContent    =data.lng.toFixed(5);
      document.getElementById('lastUpdate').textContent=new Date(data.timestamp).toLocaleTimeString();
      setStatus('ic-signal','#22c55e','Live tracking active');
      updateDistanceBanner();
    });
    busListeners[busId]=busRef;
  }

  function stopTrackingBus(busId){
    if(busListeners[busId]){off(busListeners[busId]);delete busListeners[busId];}
    if(busMarkers[busId]){map.removeLayer(busMarkers[busId]);delete busMarkers[busId];}
    delete busDirections[busId];
  }

  function trackAllBuses()   { for(let i=1;i<=9;i++) trackBus('bus'+i); }
  function stopAllTracking() { for(let i=1;i<=9;i++) stopTrackingBus('bus'+i); }

  document.getElementById('busSelect').addEventListener('change',(e)=>{
    stopAllTracking();
    document.getElementById('distance-banner').style.display='none';
    setStatus('ic-spin','var(--muted)','Waiting for bus location...');
    e.target.value==='all' ? trackAllBuses() : trackBus(e.target.value);
  });

  function setStudentLocation(lat,lng,label){
    studentLat=lat; studentLng=lng;
    if(studentMarker) map.removeLayer(studentMarker);
    studentMarker=L.marker([lat,lng],{icon:makeStudentIcon()}).addTo(map)
      .bindPopup(`<div style="font-family:Nunito,sans-serif;font-weight:700;font-size:13px">${label}</div>`)
      .openPopup();
    updateDistanceBanner();
  }

  window.getStudentGPS=function(){
    if(!navigator.geolocation){showStopSelector('GPS not supported.');return;}
    setStatus('ic-crosshairs','#3b82f6','Getting your location...');
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        setStudentLocation(pos.coords.latitude,pos.coords.longitude,'Your Location');
        setStatus('ic-check','#22c55e','Your location found via GPS');
      },
      ()=>showStopSelector('GPS failed. Please pick your stop:')
    );
  };

  window.pickStop=function(){
    const val=document.getElementById('stopSelect').value; if(!val) return;
    const [lat,lng]=val.split(',').map(Number);
    setStudentLocation(lat,lng,'Selected Stop');
    setStatus('ic-check','#22c55e','Stop selected');
  };

  function showStopSelector(msg){
    setStatus('ic-warn','#f59e0b',msg);
    document.getElementById('stop-selector').style.display='flex';
  }

  let notifiedClose=false;
  async function setupNotifications(){
    if(!('serviceWorker' in navigator)) return;
    try{ await navigator.serviceWorker.register('/JU-bus-locator/sw.js'); }catch(e){console.error(e);}
    const p=await Notification.requestPermission();
    if(p!=='granted') alert('Please allow notifications to get bus alerts!');
  }
  function notifyIfClose(d){
    if(d<500&&!notifiedClose){
      notifiedClose=true;
      new Notification('Bus is nearby!',{body:`The bus is ${Math.round(d)}m away. Get ready!`});
      setTimeout(()=>{notifiedClose=false;},120000);
    }
  }

  setupNotifications();
  trackAllBuses();
</script>
</body>
</html>
